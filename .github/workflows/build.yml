name: Gradle Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java / JDK environment
      # Uses the latest v4 action and enables automatic caching for Gradle dependencies
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Grant execute permission to the Gradle wrapper script
      # This ensures Linux runners can run the script without permission errors
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Run the Gradle build task
      - name: Build with Gradle
        run: ./gradlew build

      # Step 5: Upload the generated build artifacts (e.g., .jar files)
      # Uses the modern v4 upload utility
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: build/libs/
          retention-days: 5
          
