name: Gradle Build Pipeline (No Wrapper)

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java / JDK environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Set up standalone Gradle on the runner
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Step 4: Run the build task using system gradle (no wrapper needed)
      - name: Build with Gradle
        run: gradle build

      # Step 5: Upload the generated mod jar file
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: build/libs/
          retention-days: 5
