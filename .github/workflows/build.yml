name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up the environment (Example using Node, change as needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies and build
      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build --if-present

      # Step 4: Upload the artifact using the updated v4 action
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build-artifacts  # Must be unique per workflow run
          path: |
            dist/
            build/
          retention-days: 5                 # Optional: automatically deletes after 5 days

  # Optional second job to demonstrate downloading the artifact safely with v4
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 5: Download the artifact using the matching v4 action
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build-artifacts  # Must exactly match the upload name
          path: downloaded-artifacts/

      - name: Verify Files
        run: ls -R downloaded-artifacts/
