name: Build Dino Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant Gradle permission
        run: chmod +x dinomod-fabric-1.21.1/dinomod/gradlew

      - name: Build
        working-directory: dinomod-fabric-1.21.1/dinomod
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: dinomod-jar
          path: dinomod-fabric-1.21.1/dinomod/build/libs/*.jar
