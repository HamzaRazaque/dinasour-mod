name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js using Node 24 (avoids deprecation)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 3: Install dependencies and build (works without a lockfile)
      - name: Install Dependencies
        run: npm install

      - name: Run Build
        run: npm run build --if-present

      # Step 4: Upload the artifact using v4
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build-artifacts
          path: |
            dist/
            build/
          retention-days: 5

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 5: Download the artifact using matching v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build-artifacts
          path: downloaded-artifacts/

      - name: Verify Files
        run: ls -R downloaded-artifacts/
        
