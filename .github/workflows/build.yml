name: Gradle Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java / JDK environment with automated caching
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Grant execution rights to the wrapper inside your subfolder
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./YOUR_SUBFOLDER_NAME

      # Step 4: Run the compile task inside your subfolder
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: ./YOUR_SUBFOLDER_NAME

      # Step 5: Archive the compiled output from the subfolder path
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: ./YOUR_SUBFOLDER_NAME/build/libs/
          retention-days: 5
