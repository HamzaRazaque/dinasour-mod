name: Gradle Build Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Java / JDK environment with automated caching
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Step 3: Grant execution rights to the wrapper in the root directory
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Run the compile task pointing to the nested project directory
      - name: Build with Gradle
        run: ./gradlew build
        working-directory: ./hamblade-mod-fabric-1.21.1/hamblade-mod

      # Step 5: Archive the compiled output jar file from the nested build directory
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-artifacts
          path: ./hamblade-mod-fabric-1.21.1/hamblade-mod/build/libs/
          retention-days: 5
